id: template-regression-run
mode: research
artifacts_root: artifacts/runs
search:
  algorithm: regression
  max_iterations: 3
  seeds:
    - candidates/regression-modeling-vulnerable-crp-001.yaml
    - candidates/regression-crp-limited-crp-001.yaml
    - candidates/regression-trust-limited-remote-auth-001.yaml
worlds:
  - configs/worlds/regression-modeling-clean-v1.yaml
  - configs/worlds/regression-query-pressure-v1.yaml
  - configs/worlds/regression-untrusted-remote-auth-v1.yaml
attacks:
  - modeling
  - replay
  - nearest_match
  - crp_exhaustion
  - drift_abuse
scoring:
  file: configs/scoring/default.yaml
budgets:
  queries: 2000
  observations: 512
  search_steps: 128
